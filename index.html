<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>塗鴉記帳本</title>

<!-- PWA：讓 Android Chrome 辨識為可安裝的 App -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAF3E6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="塗鴉記帳">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Klee+One:wght@600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="js/ui-scale.js"></script>
</head>
<body>

<!-- ============ 登入畫面 ============ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-emblem"></div>
    <h1 class="login-title">塗鴉記帳本</h1>
    <p class="login-sub">記下每一筆，慢慢存出安心感</p>
    <button class="btn full" id="googleLoginBtn">
      <span class="icon google-icon">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.8-.07-1.5-.2-2.2H12v4.2h5.9c-.25 1.3-1 2.4-2.2 3.1v2.6h3.5c2-1.9 3.3-4.6 3.3-7.7Z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.5-2.6c-1 .7-2.2 1.1-3.7 1.1-2.8 0-5.2-1.9-6-4.5H2.6v2.7C4.4 20.5 7.9 23 12 23Z"/><path fill="#FBBC05" d="M6 14.4c-.2-.7-.4-1.4-.4-2.2s.1-1.5.4-2.2V7.3H2.6C1.9 8.7 1.5 10.3 1.5 12s.4 3.3 1.1 4.7L6 14.4Z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .6 4.1 1.6l3.1-3C17.4 2.3 14.9 1.2 12 1.2 7.9 1.2 4.4 3.7 2.6 7.3L6 9.8c.8-2.6 3.2-4.4 6-4.4Z"/></svg>
      </span>
      使用 Google 帳號登入
    </button>
    <p class="login-error" id="loginError" hidden></p>
  </div>
</div>

<!-- ============ 主應用 ============ -->
<div id="appShell" hidden>

<header class="app-header">
  <h1 class="app-title"><span class="icon title-icon" id="titleIcon"></span>塗鴉記帳本</h1>
  <p class="app-sub">記下每一筆，慢慢存出安心感</p>
</header>

<!-- ============ 首頁：總覽 ============ -->
<main class="view" id="view-home">

  <div class="crayon-card">
    <div class="card-title"><span class="dot"></span>本月收支結構</div>
    <div class="donut-stage">
      <div class="donut-wrap">
        <svg viewBox="0 0 160 160" class="donut-svg" id="donutSvg"></svg>
        <div class="donut-center">
          <div class="donut-center-label">月結餘</div>
          <div class="donut-center-amount" id="donutBalance">NT$ 0</div>
        </div>
      </div>
      <div class="donut-legend">
        <div class="legend-row">
          <span class="legend-dot income"></span>
          <span class="legend-text">月收入</span>
          <span class="legend-amount income" id="donutIncome">NT$ 0</span>
        </div>
        <div class="legend-row">
          <span class="legend-dot expense"></span>
          <span class="legend-text">月支出</span>
          <span class="legend-amount expense" id="donutExpense">NT$ 0</span>
        </div>
      </div>
    </div>
    <div id="homeBudgetBlock"></div>
  </div>

  <div class="overview-grid">
    <div class="crayon-card">
      <div class="card-title" style="justify-content:center"><span class="dot" style="background:var(--crayon-green)"></span>本月收入</div>
      <div class="amount income" id="homeIncome">NT$ 0</div>
      <div class="label">收入</div>
    </div>
    <div class="crayon-card tilt-r">
      <div class="card-title" style="justify-content:center"><span class="dot" style="background:var(--crayon-red)"></span>本月支出</div>
      <div class="amount expense" id="homeExpense">NT$ 0</div>
      <div class="label">支出</div>
    </div>
    <div class="crayon-card">
      <div class="card-title" style="justify-content:center"><span class="dot" style="background:var(--crayon-blue)"></span>總資產</div>
      <div class="amount" id="homeTotalBalance" style="color:var(--ink)">NT$ 0</div>
      <div class="label">所有帳戶</div>
    </div>
  </div>

  <div class="crayon-card">
    <div class="card-title spread">
      <span style="display:flex;align-items:center;gap:8px;"><span class="dot"></span>最近交易</span>
      <button class="btn ghost sm" data-nav="ledger">查看全部</button>
    </div>
    <div id="homeRecentList"></div>
  </div>

</main>

<!-- ============ 記帳頁 ============ -->
<main class="view" id="view-ledger" hidden>

  <div class="account-scroll" id="accountScroll"></div>

  <div class="crayon-card tight">
    <div class="card-title spread" style="margin-bottom:0;">
      <span style="display:flex;align-items:center;gap:8px;"><span class="dot"></span>交易明細</span>
      <span class="tag" id="ledgerCount">0 筆</span>
    </div>
  </div>

  <div id="ledgerList"></div>

</main>

<!-- ============ 統計頁 ============ -->
<main class="view" id="view-stats" hidden>

  <div class="crayon-card">
    <div class="card-title"><span class="dot" style="background:var(--crayon-purple)"></span>本月支出分類比例</div>
    <div id="pieChartMount" style="min-height:260px;"></div>
  </div>

  <div class="crayon-card">
    <div class="card-title"><span class="dot" style="background:var(--crayon-blue)"></span>近 6 個月收支趨勢</div>
    <div id="lineChartMount" style="min-height:260px;"></div>
  </div>

</main>

<!-- ============ 設定頁 ============ -->
<main class="view" id="view-settings" hidden>

  <div class="crayon-card">
    <div class="card-title spread">
      <span style="display:flex;align-items:center;gap:8px;"><span class="dot" style="background:var(--crayon-purple)"></span>帳號</span>
    </div>
    <div class="account-profile">
      <img id="userAvatar" class="user-avatar" alt="" style="display:none;">
      <div class="user-name" id="userDisplayName">—</div>
    </div>
    <div class="sync-status" id="syncStatus"></div>
    <button class="btn danger sm" id="logoutBtn" style="margin-top:10px;">登出</button>
  </div>

  <div class="crayon-card">
    <div class="card-title"><span class="dot" style="background:var(--crayon-green)"></span>安裝成 App</div>
    <p style="font-size:0.85rem; color:var(--ink-soft); margin:0 0 12px;">安裝後可以從平板主畫面直接打開，畫面更乾淨</p>
    <div id="installAppBlock"></div>
  </div>

  <div class="crayon-card">
    <div class="card-title"><span class="dot" style="background:var(--crayon-blue)"></span>介面大小</div>
    <p style="font-size:0.85rem; color:var(--ink-soft); margin:0 0 12px;">調整整體文字與按鈕的大小</p>
    <div class="size-pick" id="sizePick">
      <button type="button" class="size-opt" data-size="normal">小</button>
      <button type="button" class="size-opt" data-size="medium">中</button>
      <button type="button" class="size-opt" data-size="large">大</button>
      <button type="button" class="size-opt" data-size="xlarge">特大</button>
    </div>
  </div>

  <div class="crayon-card">
    <div class="card-title spread">
      <span style="display:flex;align-items:center;gap:8px;"><span class="dot"></span>帳戶管理</span>
      <button class="btn sm" id="btnAddAccount">＋ 新增帳戶</button>
    </div>
    <div id="settingsAccountList"></div>
  </div>

  <div class="crayon-card">
    <div class="card-title"><span class="dot" style="background:var(--crayon-yellow)"></span>本月預算</div>
    <div class="field">
      <label for="budgetInput">設定本月總預算 (NT$)</label>
      <input type="number" id="budgetInput" min="0" step="100" placeholder="例如 20000">
    </div>
    <button class="btn full" id="btnSaveBudget">儲存預算</button>
  </div>

  <div class="crayon-card">
    <div class="card-title spread">
      <span style="display:flex;align-items:center;gap:8px;"><span class="dot" style="background:var(--crayon-green)"></span>分類管理</span>
    </div>
    <div style="margin-bottom:10px;">
      <div class="card-title" style="font-size:0.85rem; margin-bottom:6px;">支出分類</div>
      <div class="chip-group" id="expenseCategoryList"></div>
    </div>
    <div style="margin-bottom:14px;">
      <div class="card-title" style="font-size:0.85rem; margin-bottom:6px;">收入分類</div>
      <div class="chip-group" id="incomeCategoryList"></div>
    </div>
    <button class="btn green sm" id="btnAddCategory">＋ 新增分類</button>
  </div>

</main>

<!-- ============ 底部導覽 ============ -->
<nav class="bottom-nav">
  <button class="nav-btn active" data-nav="home"><span class="icon" id="navIconHome"></span>首頁</button>
  <button class="nav-btn" data-nav="ledger"><span class="icon" id="navIconLedger"></span>記帳</button>
  <button class="nav-btn" data-nav="stats"><span class="icon" id="navIconStats"></span>統計</button>
  <button class="nav-btn" data-nav="settings"><span class="icon" id="navIconSettings"></span>設定</button>
</nav>

<!-- 新增記帳 FAB -->
<button class="fab" id="fabAdd" title="新增一筆"><span class="icon" id="fabIcon"></span></button>

<!-- ============ 新增/編輯交易 彈窗 ============ -->
<div class="modal-mask" id="txModalMask">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3 id="txModalTitle">新增一筆</h3>
      <button class="modal-close" id="txModalClose"><span class="icon" id="txCloseIcon"></span></button>
    </div>

    <div class="segmented" style="margin-bottom:16px;">
      <button type="button" class="active expense" data-type="expense">支出</button>
      <button type="button" class="income" data-type="income">收入</button>
    </div>

    <div class="field">
      <label for="txAmount">金額</label>
      <input type="number" id="txAmount" inputmode="decimal" placeholder="0" min="0" step="1">
    </div>

    <div class="field">
      <label>分類</label>
      <div class="chip-group" id="txCategoryChips"></div>
    </div>

    <div class="field">
      <label for="txAccount">帳戶</label>
      <select id="txAccount"></select>
    </div>

    <div class="field">
      <label for="txDate">日期</label>
      <input type="date" id="txDate">
    </div>

    <div class="field">
      <label for="txNote">備忘（選填）</label>
      <textarea id="txNote" placeholder="例如：和朋友的下午茶"></textarea>
    </div>

    <div style="display:flex; gap:10px;">
      <button class="btn danger" id="txDeleteBtn" style="display:none;">刪除</button>
      <button class="btn full" id="txSaveBtn">儲存這一筆</button>
    </div>
  </div>
</div>

<!-- ============ 新增帳戶 彈窗 ============ -->
<div class="modal-mask" id="accModalMask">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>新增帳戶</h3>
      <button class="modal-close" id="accModalClose"><span class="icon" id="accCloseIcon"></span></button>
    </div>
    <div class="field">
      <label for="accName">帳戶名稱</label>
      <input type="text" id="accName" placeholder="例如：現金、玉山銀行、悠遊卡">
    </div>
    <div class="field">
      <label for="accBalance">初始餘額 (NT$)</label>
      <input type="number" id="accBalance" placeholder="0" step="1">
    </div>
    <div class="field">
      <label>顏色標記</label>
      <div class="color-pick" id="accColorPick"></div>
    </div>
    <button class="btn full" id="accSaveBtn">建立帳戶</button>
  </div>
</div>

<!-- ============ 新增分類 彈窗 ============ -->
<div class="modal-mask" id="catModalMask">
  <div class="modal-sheet">
    <div class="modal-head">
      <h3>新增分類</h3>
      <button class="modal-close" id="catModalClose"><span class="icon" id="catCloseIcon"></span></button>
    </div>
    <div class="segmented" style="margin-bottom:16px;">
      <button type="button" class="active expense" data-cattype="expense">支出分類</button>
      <button type="button" class="income" data-cattype="income">收入分類</button>
    </div>
    <div class="field">
      <label for="catName">分類名稱</label>
      <input type="text" id="catName" placeholder="例如：寵物、訂閱服務">
    </div>
    <div class="field">
      <label>選擇圖示</label>
      <div class="icon-pick" id="catIconPick"></div>
    </div>
    <button class="btn full" id="catSaveBtn">新增分類</button>
  </div>
</div>

</div><!-- /#appShell -->

<script type="module" src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/datastore.js"></script>
<script src="js/utils.js"></script>
<script src="js/icons.js"></script>
<script src="js/donut-chart.js"></script>
<script src="js/state.js"></script>
<script src="js/router.js"></script>
<script src="js/render-home.js"></script>
<script src="js/render-ledger.js"></script>
<script src="js/render-stats.js"></script>
<script src="js/render-settings.js"></script>
<script src="js/modals.js"></script>
<script src="js/app.js"></script>
<script src="js/install-app.js"></script>

<script>
  // 註冊 Service Worker，讓 App 能離線開啟（瀏覽器不支援時安靜略過）
  window.__swStatus = 'not-attempted';
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then((reg) => {
          window.__swStatus = 'registered';
          console.log('Service Worker 註冊成功:', reg.scope);
        })
        .catch((err) => {
          window.__swStatus = 'failed: ' + err.message;
          console.warn('Service Worker 註冊失敗:', err);
        });
    });
  } else {
    window.__swStatus = 'unsupported';
  }
</script>
</body>
</html>
